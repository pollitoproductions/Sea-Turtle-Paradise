<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sea Turtle Paradise</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; overflow: hidden; background-color: #000714; touch-action: none; }
    canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }
  </style>
</head>
<body class="relative w-full h-screen overflow-hidden bg-[#000714]">

  <div class="absolute top-8 right-8 flex flex-col gap-4 z-20 pointer-events-auto">
    <button
      id="waterBtn"
      class="w-12 h-12 rounded-full flex items-center justify-center backdrop-blur-md transition-all duration-300 bg-cyan-500/30 border border-cyan-200 text-white shadow-[0_0_15px_rgba(34,211,238,0.5)] scale-110"
      title="Water Interaction Mode"
    >
      <svg viewBox="0 0 24 24" fill="none" class="w-6 h-6" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M2 12C4 12 5 14 8 14C11 14 13 10 16 10C19 10 20 12 22 12M2 16C4 16 5 18 8 18C11 18 13 14 16 14C19 14 20 16 22 16" />
      </svg>
    </button>
    <button
      id="foodBtn"
      class="w-12 h-12 rounded-full flex items-center justify-center backdrop-blur-md transition-all duration-300 bg-slate-900/50 border border-slate-600 text-green-300 hover:bg-slate-800/60 shadow-lg"
      title="Feeding Mode"
    >
      <svg viewBox="0 0 24 24" fill="none" class="w-8 h-8">
        <circle cx="12" cy="12" r="10" fill="#134d24" stroke="#0a2e12" stroke-width="0.5"/>
        <circle cx="12" cy="12" r="8.5" fill="#7dce94" />
        <circle cx="12" cy="12" r="7" fill="#e2f5e6" />
        <path d="M12 12 Q 15 8 16 12 Q 15 16 12 12" fill="#b6e3c4" transform="rotate(0 12 12)"/>
        <path d="M12 12 Q 15 8 16 12 Q 15 16 12 12" fill="#b6e3c4" transform="rotate(120 12 12)"/>
        <path d="M12 12 Q 15 8 16 12 Q 15 16 12 12" fill="#b6e3c4" transform="rotate(240 12 12)"/>
        <ellipse cx="14" cy="11.5" rx="0.8" ry="0.4" fill="#fff" transform="rotate(30 14 11.5)"/>
        <ellipse cx="14" cy="12.5" rx="0.8" ry="0.4" fill="#fff" transform="rotate(-30 14 12.5)"/>
        <ellipse cx="10" cy="10" rx="0.8" ry="0.4" fill="#fff" transform="rotate(150 10 10)"/>
        <ellipse cx="11" cy="9" rx="0.8" ry="0.4" fill="#fff" transform="rotate(90 11 9)"/>
        <ellipse cx="10" cy="14" rx="0.8" ry="0.4" fill="#fff" transform="rotate(210 10 14)"/>
        <ellipse cx="11" cy="15" rx="0.8" ry="0.4" fill="#fff" transform="rotate(270 11 15)"/>
      </svg>
    </button>
    <button
      id="muteBtn"
      class="w-12 h-12 rounded-full flex items-center justify-center backdrop-blur-md transition-all duration-300 bg-slate-900/50 border border-slate-600 text-white hover:bg-slate-800/60 shadow-lg"
      title="Toggle Brown Noise"
      aria-label="Toggle Brown Noise"
    >
      <svg viewBox="0 0 24 24" fill="none" class="w-6 h-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 5L6 9H3v6h3l5 4V5z" />
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
        <path d="M19.07 5.93a9 9 0 0 1 0 12.73" />
        <path id="muteSlash" d="M4 4l16 16" />
      </svg>
    </button>
  </div>

  <div id="orientationOverlay" class="pointer-events-none absolute inset-0 z-50 flex items-center justify-center bg-black/70 text-white text-center px-6 py-4 text-lg tracking-wide leading-relaxed opacity-0 transition-opacity duration-300">
    Please rotate your device to <span class="font-semibold">landscape</span> for the best experience.
  </div>

  <canvas id="oceanCanvas"></canvas>

  <script>
    // --- State Management (Replacing React useState/useRef) ---
    const canvas = document.getElementById('oceanCanvas');
    const ctx = canvas.getContext('2d');

    let mode = 'water'; // 'water' or 'food'
    const waterBtn = document.getElementById('waterBtn');
    const foodBtn = document.getElementById('foodBtn');
    const muteBtn = document.getElementById('muteBtn');

    // --- Brown noise audio ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let brownSource = null;
    let gainNode = null;
    let isMuted = true;

    function updateOrientationOverlay() {
      const overlay = document.getElementById('orientationOverlay');
      if (!overlay) return;
      const isPortrait = window.innerHeight > window.innerWidth;
      overlay.style.opacity = isPortrait ? '1' : '0';
    }

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      updateOrientationOverlay();
    }

    function createBrownNoiseBuffer(duration = 2) {
      const sampleRate = audioCtx.sampleRate;
      const bufferSize = sampleRate * duration;
      const buffer = audioCtx.createBuffer(1, bufferSize, sampleRate);
      const data = buffer.getChannelData(0);
      let lastOut = 0;
      for (let i = 0; i < bufferSize; i += 1) {
        const white = Math.random() * 2 - 1;
        lastOut = (lastOut + (0.02 * white)) / 1.02;
        data[i] = lastOut * 3.5;
      }
      return buffer;
    }

    function startBrownNoise() {
      if (brownSource) return;
      gainNode = audioCtx.createGain();
      gainNode.gain.value = 0.12;
      gainNode.connect(audioCtx.destination);

      // Add a gentle 'smile' EQ (bass + treble boost) for a deeper underwater vibe
      const lowShelf = audioCtx.createBiquadFilter();
      lowShelf.type = 'lowshelf';
      lowShelf.frequency.value = 200;
      lowShelf.gain.value = 9;

      const highShelf = audioCtx.createBiquadFilter();
      highShelf.type = 'highshelf';
      highShelf.frequency.value = 6000;
      highShelf.gain.value = 7;

      brownSource = audioCtx.createBufferSource();
      brownSource.buffer = createBrownNoiseBuffer(2);
      brownSource.loop = true;

      brownSource.connect(lowShelf);
      lowShelf.connect(highShelf);
      highShelf.connect(gainNode);
      brownSource.start();
    }

    function stopBrownNoise() {
      if (!brownSource) return;
      brownSource.stop();
      brownSource.disconnect();
      gainNode.disconnect();
      brownSource = null;
      gainNode = null;
    }

    function updateMuteUI() {
      if (isMuted) {
        muteBtn.classList.remove('text-green-300');
        muteBtn.classList.add('text-white');
        muteBtn.querySelector('#muteSlash').style.display = 'block';
      } else {
        muteBtn.classList.remove('text-white');
        muteBtn.classList.add('text-green-300');
        muteBtn.querySelector('#muteSlash').style.display = 'none';
      }
    }

    muteBtn.addEventListener('click', () => {
      if (isMuted) {
        startBrownNoise();
      } else {
        stopBrownNoise();
      }
      isMuted = !isMuted;
      updateMuteUI();
    });

    updateMuteUI();

    function handleVisibilityChange() {
      if (document.hidden) {
        if (!isMuted) {
          stopBrownNoise();
          isMuted = true;
          updateMuteUI();
        }
      }
    }

    document.addEventListener('visibilitychange', handleVisibilityChange);
    window.addEventListener('blur', handleVisibilityChange);
    window.addEventListener('pagehide', handleVisibilityChange);

    const gameState = {
      food: [],
      waves: [],
      pointerActive: false,
      lastX: 0,
      lastY: 0
    };

    // --- UI Update Logic ---
    function updateUI() {
      if (mode === 'water') {
        waterBtn.className = "w-12 h-12 rounded-full flex items-center justify-center backdrop-blur-md transition-all duration-300 bg-cyan-500/30 border border-cyan-200 text-white shadow-[0_0_15px_rgba(34,211,238,0.5)] scale-110";
        foodBtn.className = "w-12 h-12 rounded-full flex items-center justify-center backdrop-blur-md transition-all duration-300 bg-slate-900/50 border border-slate-600 text-green-300 hover:bg-slate-800/60 shadow-lg";
      } else {
        foodBtn.className = "w-12 h-12 rounded-full flex items-center justify-center backdrop-blur-md transition-all duration-300 bg-green-500/30 border border-green-200 text-white shadow-[0_0_15px_rgba(74,222,128,0.5)] scale-110";
        waterBtn.className = "w-12 h-12 rounded-full flex items-center justify-center backdrop-blur-md transition-all duration-300 bg-slate-900/50 border border-slate-600 text-cyan-200 hover:bg-slate-800/60 shadow-lg";
      }
    }

    waterBtn.addEventListener('click', () => { mode = 'water'; updateUI(); });
    foodBtn.addEventListener('click', () => { mode = 'food'; updateUI(); });

    // --- Setup & Sizing ---
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // --- Data Definitions ---
    const numParticles = 150;
    const particles = Array.from({ length: numParticles }, () => ({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      size: Math.random() * 2 + 0.5,
      speed: Math.random() * 0.5 + 0.1,
      offset: Math.random() * Math.PI * 2,
      alpha: Math.random() * 0.3 + 0.05
    }));

    const PALETTES = {
      darkTeal: { backFinBase: '#178a84', backFinShadow: '#002020', neck: '#145c5c', headHi: '#8cdada', headMid: '#3bbdb8', headShad: '#003d3d', beak: '#001a1a', frontFinInner: '#003838', frontFinMid: '#3bbdb8', frontFinTip: '#002020', shellPeak: '#8cdada', shellMid: '#3bbdb8', shellBase: '#178a84', shellRim: '#003d3d' },
      babyBlue: { backFinBase: '#a0c8e8', backFinShadow: '#305070', neck: '#608eb0', headHi: '#e0f0ff', headMid: '#80b8e0', headShad: '#407090', beak: '#1a3040', frontFinInner: '#407090', frontFinMid: '#80b8e0', frontFinTip: '#305070', shellPeak: '#e0f0ff', shellMid: '#80b8e0', shellBase: '#6098c0', shellRim: '#407090' },
      cucumberGreen: { backFinBase: '#a8d8a8', backFinShadow: '#306030', neck: '#68a868', headHi: '#e0ffe0', headMid: '#80c880', headShad: '#408040', beak: '#1a401a', frontFinInner: '#408040', frontFinMid: '#80c880', frontFinTip: '#306030', shellPeak: '#e0ffe0', shellMid: '#80c880', shellBase: '#68b868', shellRim: '#408040' },
      lightTeal: { backFinBase: '#48d1cc', backFinShadow: '#004c4c', neck: '#20b2aa', headHi: '#e0ffff', headMid: '#afeeee', headShad: '#008080', beak: '#004040', frontFinInner: '#008080', frontFinMid: '#afeeee', frontFinTip: '#004c4c', shellPeak: '#e0ffff', shellMid: '#afeeee', shellBase: '#48d1cc', shellRim: '#008080' }
    };

    const turtles = [
      { scaleMult: 1.0, timeOffset: 0, palette: PALETTES.darkTeal },
      { scaleMult: 0.65, timeOffset: 1500, palette: PALETTES.babyBlue },
      { scaleMult: 0.55, timeOffset: 5000, palette: PALETTES.cucumberGreen },
      { scaleMult: 0.8, timeOffset: 3200, palette: PALETTES.lightTeal },
      { scaleMult: 0.45, timeOffset: 7000, palette: PALETTES.babyBlue },
      { scaleMult: 0.75, timeOffset: 2100, palette: PALETTES.darkTeal },
      { scaleMult: 0.5, timeOffset: 8500, palette: PALETTES.lightTeal },
      { scaleMult: 0.6, timeOffset: 4100, palette: PALETTES.cucumberGreen },
      { scaleMult: 0.32, timeOffset: 1200, palette: PALETTES.babyBlue, isBaby: true },
      { scaleMult: 0.28, timeOffset: 2400, palette: PALETTES.cucumberGreen, isBaby: true },
      { scaleMult: 0.30, timeOffset: 3600, palette: PALETTES.lightTeal, isBaby: true },
      { scaleMult: 0.25, timeOffset: 4800, palette: PALETTES.darkTeal, isBaby: true },
      { scaleMult: 0.35, timeOffset: 6000, palette: PALETTES.babyBlue, isBaby: true }
    ].map(t => {
      const spd = t.isBaby ? (1.2 + Math.random() * 0.8) * t.scaleMult : (0.4 + Math.random() * 0.5) * t.scaleMult;
      return {
        ...t,
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        angle: Math.random() * Math.PI * 2,
        targetAngle: Math.random() * Math.PI * 2,
        speed: spd,
        baseSpeed: spd
      };
    });

    // --- Drawing Helper Functions ---
    const drawShadow = (ctx) => {
      ctx.save();
      ctx.translate(80, 100);
      ctx.scale(1, 1.15);
      ctx.beginPath();
      ctx.arc(0, 0, 150, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0, 5, 15, 0.4)';
      ctx.filter = 'blur(40px)';
      ctx.fill();
      ctx.restore();
    };

    const drawBackFlippers = (ctx, time, palette) => {
      const sweep = Math.sin(time * 0.002 - Math.PI / 4);
      for (const side of [-1, 1]) {
        ctx.save();
        ctx.translate(side * 50, 120);
        ctx.rotate(side * (-sweep * 0.15 - 0.1));
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.bezierCurveTo(side * 50, 20, side * 70, 90, side * 40, 120);
        ctx.bezierCurveTo(side * 10, 100, side * -10, 40, 0, 0);
        const grad = ctx.createLinearGradient(0, 0, side * 40, 120);
        grad.addColorStop(0, palette.backFinBase);
        grad.addColorStop(1, palette.backFinShadow);
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.restore();
      }
    };

    const drawHead = (ctx, time, palette) => {
      const nod = Math.sin(time * 0.001) * 0.04;
      ctx.save();
      ctx.translate(0, -135);
      ctx.rotate(nod);
      
      ctx.beginPath();
      ctx.moveTo(-25, 20); ctx.lineTo(25, 20); ctx.lineTo(20, -20); ctx.lineTo(-20, -20);
      ctx.fillStyle = palette.neck;
      ctx.fill();

      ctx.beginPath();
      ctx.ellipse(0, -30, 32, 42, 0, 0, Math.PI * 2);
      const headGrad = ctx.createRadialGradient(-10, -40, 5, 0, -30, 42);
      headGrad.addColorStop(0, palette.headHi);
      headGrad.addColorStop(0.6, palette.headMid);
      headGrad.addColorStop(1, palette.headShad);
      ctx.fillStyle = headGrad;
      ctx.fill();

      for (const side of [-1, 1]) {
        ctx.beginPath();
        ctx.ellipse(side * 24, -38, 4, 7, side * 0.2, 0, Math.PI * 2);
        ctx.fillStyle = '#080808';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(side * 23, -40, 1.5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.fill();
      }

      ctx.beginPath();
      ctx.moveTo(-12, -68); ctx.lineTo(12, -68); ctx.lineTo(0, -82);
      ctx.fillStyle = palette.beak;
      ctx.fill();
      ctx.restore();
    };

    const drawFrontFlippers = (ctx, time, palette) => {
      const sweep = Math.sin(time * 0.0015);
      const flex = Math.cos(time * 0.0015);
      for (const side of [-1, 1]) {
        ctx.save();
        ctx.translate(side * 75, -50);
        ctx.rotate(side * (sweep * 0.25 + 0.15));
        
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.bezierCurveTo(side * 90, -20, side * 200 + flex * 15, 30 + sweep * 25, side * 240, 130);
        ctx.bezierCurveTo(side * 150, 110, side * 50, 70, 0, 50);
        ctx.closePath();

        const grad = ctx.createLinearGradient(0, -20, side * 240, 130);
        grad.addColorStop(0, palette.frontFinInner);
        grad.addColorStop(0.4, palette.frontFinMid);
        grad.addColorStop(1, palette.frontFinTip);
        ctx.fillStyle = grad;
        ctx.fill();

        ctx.clip();
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        for (let i = 0; i < 25; i++) {
          ctx.beginPath();
          const dx = (Math.sin(i * 11) * 0.5 + 0.5) * 220 * side;
          const dy = (Math.cos(i * 19) * 0.5 + 0.5) * 120;
          ctx.arc(dx, dy, 2 + Math.sin(i) * 2, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }
    };

    const drawShell = (ctx, time, palette) => {
      ctx.save();
      ctx.beginPath();
      ctx.scale(1, 1.18);
      ctx.arc(0, 0, 135, 0, Math.PI * 2);
      ctx.restore();

      const shellGrad = ctx.createRadialGradient(-30, -30, 20, 0, 0, 155);
      shellGrad.addColorStop(0, palette.shellPeak);
      shellGrad.addColorStop(0.3, palette.shellMid);
      shellGrad.addColorStop(0.7, palette.shellBase);
      shellGrad.addColorStop(1, palette.shellRim);
      
      ctx.fillStyle = shellGrad;
      ctx.shadowColor = 'rgba(0, 0, 0, 0.6)';
      ctx.shadowBlur = 15;
      ctx.fill();
      ctx.shadowBlur = 0;

      for (let i = -2; i <= 2; i++) {
        ctx.beginPath();
        ctx.ellipse(0, i * 45, 40 - Math.abs(i) * 6, 28, 0, 0, Math.PI * 2);
        const hGrad = ctx.createLinearGradient(0, i * 45 - 28, 0, i * 45 + 28);
        hGrad.addColorStop(0, 'rgba(255, 255, 255, 0.15)');
        hGrad.addColorStop(1, 'rgba(0, 0, 0, 0.25)');
        ctx.fillStyle = hGrad;
        ctx.fill();
        ctx.lineWidth = 1;
        ctx.strokeStyle = 'rgba(0,0,0,0.3)';
        ctx.stroke();
      }

      for (const side of [-1, 1]) {
        for (let i = -1.5; i <= 1.5; i++) {
          ctx.beginPath();
          ctx.ellipse(side * 60, i * 50, 28, 40, side * 0.2, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
          ctx.fill();
          ctx.stroke();
        }
      }

      ctx.save();
      ctx.globalCompositeOperation = 'overlay';
      ctx.beginPath();
      ctx.scale(1, 1.18);
      ctx.arc(0, 0, 135, 0, Math.PI * 2);
      ctx.restore();
      ctx.clip();

      const cTime = time * 0.001;
      ctx.fillStyle = 'rgba(160, 220, 255, 0.15)';
      for (let i = 0; i < 6; i++) {
        ctx.beginPath();
        ctx.arc(
          Math.sin(cTime + i) * 80,
          Math.cos(cTime * 0.8 + i * 2) * 100,
          40 + Math.sin(i) * 20,
          0, Math.PI * 2
        );
        ctx.fill();
      }
      ctx.restore();
    };

    const drawRealisticTurtle = (ctx, globalTime, width, height, t) => {
      const time = globalTime + t.timeOffset;
      const hoverY = Math.sin(time * 0.001) * 10;
      const hoverX = Math.cos(time * 0.0008) * 10;
      const swimWobble = Math.sin(time * 0.0015) * 0.08;

      ctx.save();
      ctx.translate(t.x + hoverX, t.y + hoverY);
      ctx.rotate(t.angle + Math.PI / 2 + swimWobble);

      const scale = Math.min(1, width / 900) * 0.5 * t.scaleMult;
      ctx.scale(scale, scale);

      drawShadow(ctx);
      drawBackFlippers(ctx, time, t.palette);
      drawHead(ctx, time, t.palette);
      drawFrontFlippers(ctx, time, t.palette);
      drawShell(ctx, time, t.palette);

      ctx.restore();
    };

    // --- Main Render Loop ---
    function render(time) {
      const { width, height } = canvas;

      // 1. Background
      const bgGrad = ctx.createLinearGradient(0, 0, 0, height);
      bgGrad.addColorStop(0, '#001e36');
      bgGrad.addColorStop(1, '#000714');
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, width, height);

      // 2. God Rays
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      const rayTime = time * 0.0003;
      for (let i = 0; i < 7; i++) {
        const offset = Math.sin(rayTime + i * 1.5) * 250;
        const alpha = (Math.sin(rayTime * 3 + i) + 1) * 0.02 + 0.01;
        ctx.fillStyle = `rgba(100, 200, 255, ${alpha})`;
        ctx.beginPath();
        ctx.moveTo(width / 2 - 400 + offset, -100);
        ctx.lineTo(width / 2 + 400 + offset, -100);
        ctx.lineTo(width / 2 + 1000 + offset * 2, height + 100);
        ctx.lineTo(width / 2 - 1000 + offset * 2, height + 100);
        ctx.fill();
      }
      ctx.restore();

      // 3. Food
      gameState.food.forEach(f => {
        f.size += (f.targetSize - f.size) * 0.1;
        if (f.size < 0.5) return;
        
        ctx.save();
        ctx.translate(f.x, f.y);
        ctx.rotate(f.rot);
        ctx.shadowColor = 'rgba(0, 10, 20, 0.5)';
        ctx.shadowBlur = 6;
        ctx.shadowOffsetY = 3;

        const rindGrad = ctx.createRadialGradient(0, 0, f.size * 0.8, 0, 0, f.size);
        rindGrad.addColorStop(0, '#1c4a25');
        rindGrad.addColorStop(1, '#0b2612');
        ctx.fillStyle = rindGrad;
        ctx.beginPath();
        for (let i = 0; i <= Math.PI * 2 + 0.1; i += 0.3) {
          const r = f.size + Math.sin(i * 5) * (f.size * 0.04);
          if (i === 0) ctx.moveTo(r, 0); else ctx.lineTo(Math.cos(i) * r, Math.sin(i) * r);
        }
        ctx.closePath();
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.shadowOffsetY = 0;
        ctx.shadowColor = 'transparent';

        const fleshGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, f.size * 0.9);
        fleshGrad.addColorStop(0, '#f0fcf2');
        fleshGrad.addColorStop(0.5, '#d8f2df');
        fleshGrad.addColorStop(1, '#81cf9d');
        ctx.fillStyle = fleshGrad;
        ctx.beginPath();
        ctx.arc(0, 0, f.size * 0.9, 0, Math.PI * 2);
        ctx.fill();

        for (let i = 0; i < 3; i++) {
          const angle = (Math.PI * 2 / 3) * i;
          ctx.save();
          ctx.rotate(angle);
          
          ctx.fillStyle = 'rgba(180, 230, 195, 0.6)';
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.bezierCurveTo(f.size * 0.3, f.size * 0.25, f.size * 0.6, f.size * 0.35, f.size * 0.5, 0);
          ctx.bezierCurveTo(f.size * 0.6, -f.size * 0.35, f.size * 0.3, -f.size * 0.25, 0, 0);
          ctx.fill();

          ctx.fillStyle = '#fafffb';
          ctx.beginPath();
          ctx.ellipse(f.size * 0.35, f.size * 0.12, f.size * 0.1, f.size * 0.05, 0.3, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(f.size * 0.35, -f.size * 0.12, f.size * 0.1, f.size * 0.05, -0.3, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
        ctx.restore();
      });

      // 4. Waves
      gameState.waves = gameState.waves.filter(w => w.age < w.life);
      gameState.waves.forEach(w => {
        w.age += 1;
        const prog = w.age / w.life;
        const radius = 10 + (w.age * w.speed);
        const alpha = 1 - prog;
        
        ctx.beginPath();
        ctx.arc(w.x, w.y, radius, 0, Math.PI * 2);
        ctx.lineWidth = 4 * alpha;
        ctx.strokeStyle = `rgba(180, 230, 255, ${alpha * 0.5})`;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(w.x, w.y, radius + 15 * prog, 0, Math.PI * 2);
        ctx.lineWidth = 2 * alpha;
        ctx.strokeStyle = `rgba(100, 200, 255, ${alpha * 0.3})`;
        ctx.stroke();
      });

      // 5. Turtles
      turtles.forEach(t => {
        let isAvoidingEdge = false;
        let foundFood = false;

        if (gameState.food.length > 0) {
          let nearestFood = null;
          let nearestDist = Infinity;
          
          gameState.food.forEach((f, index) => {
            const dist = Math.hypot(f.x - t.x, f.y - t.y);
            if (dist < nearestDist) {
              nearestDist = dist;
              nearestFood = { f, index };
            }
          });

          if (nearestFood && nearestDist < 1200) {
            foundFood = true;
            t.targetAngle = Math.atan2(nearestFood.f.y - t.y, nearestFood.f.x - t.x);
            t.speed = t.baseSpeed * 4.5;
            
            if (nearestDist < 60 * t.scaleMult) {
               gameState.food.splice(nearestFood.index, 1);
            }
          }
        }

        if (!foundFood) t.speed = t.baseSpeed;

        if (!foundFood && Math.random() < 0.01) {
          t.targetAngle += (Math.random() - 0.5) * Math.PI;
        }
        
        const marginX = Math.min(width * 0.25, 220 * t.scaleMult);
        const marginY = Math.min(height * 0.25, 220 * t.scaleMult);

        if (t.x < marginX || t.x > width - marginX || t.y < marginY || t.y > height - marginY) {
          isAvoidingEdge = true;
          t.targetAngle = Math.atan2((height / 2) - t.y, (width / 2) - t.x);
        }

        let diff = t.targetAngle - t.angle;
        while (diff < -Math.PI) diff += Math.PI * 2;
        while (diff > Math.PI) diff -= Math.PI * 2;
        
        t.angle += diff * (isAvoidingEdge ? 0.08 : (foundFood ? 0.07 : 0.015));
        t.x += Math.cos(t.angle) * t.speed;
        t.y += Math.sin(t.angle) * t.speed;

        const padding = Math.min(width * 0.1, height * 0.1, 90 * t.scaleMult);
        t.x = Math.max(padding, Math.min(width - padding, t.x));
        t.y = Math.max(padding, Math.min(height - padding, t.y));

        drawRealisticTurtle(ctx, time, width, height, t);
      });

      // 6. Particles
      particles.forEach(p => {
        p.y -= p.speed;
        p.x += Math.sin(time * 0.001 + p.offset) * 0.4;
        if (p.y < -20) { p.y = height + 20; p.x = Math.random() * width; }
        ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      });

      requestAnimationFrame(render);
    }
    
    requestAnimationFrame(render);

    // --- Interactive Input Handlers ---
    const handlePointerDown = (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      gameState.pointerActive = true;
      gameState.lastX = x;
      gameState.lastY = y;

      if (mode === 'food') {
        gameState.food.push({ x, y, size: 0, targetSize: 15, rot: Math.random() * Math.PI * 2 });
        gameState.waves.push({ x, y, age: 0, life: 60, speed: 1.5 });
      } else {
        gameState.waves.push({ x, y, age: 0, life: 100, speed: 2.5 });
      }
    };

    const handlePointerMove = (e) => {
      if (!gameState.pointerActive || mode !== 'water') return;
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      const dx = x - gameState.lastX;
      const dy = y - gameState.lastY;
      if (Math.hypot(dx, dy) > 25) {
        gameState.waves.push({ x, y, age: 0, life: 80, speed: 2 });
        gameState.lastX = x;
        gameState.lastY = y;
      }
    };

    const handlePointerUp = () => { gameState.pointerActive = false; };

    canvas.addEventListener('pointerdown', handlePointerDown);
    canvas.addEventListener('pointermove', handlePointerMove);
    canvas.addEventListener('pointerup', handlePointerUp);
    canvas.addEventListener('pointerleave', handlePointerUp);

  </script>
</body>
</html>
